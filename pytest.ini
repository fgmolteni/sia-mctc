[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    unit: marca pruebas unitarias
    integration: marca pruebas de integración
    component: marca pruebas de componentes UI
    state: marca pruebas de estado de Reflex
    slow: marca pruebas lentas